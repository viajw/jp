<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>가나 → 로마자 (타이핑)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'Noto Sans JP', 'sans-serif'],
                        serif: ['Noto Serif JP', 'serif'],
                    },
                },
            },
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        #answer-input {
            font-size: 2rem;
            text-align: center;
            border: 3px solid #e5e7eb;
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none; /* iOS 입력창 그림자 제거 */
            appearance: none;
        }
        #answer-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        #answer-input.correct { border-color: #22c55e; background-color: #f0fdf4; color: #15803d; }
        #answer-input.incorrect { border-color: #ef4444; background-color: #fef2f2; color: #b91c1c; }

        /* 버튼 애니메이션 */
        .btn-active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="w-full max-w-xl bg-white rounded-3xl shadow-xl p-6 sm:p-8">
        
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold text-gray-800 mb-1">로마자 타이핑</h1>
            <p class="text-gray-400 text-xs">문자를 보고 로마자를 입력하세요</p>
        </div>

        <div id="question-display" class="text-center mb-6 bg-gray-50 py-10 rounded-2xl border border-gray-100">
            <span id="question-char" class="text-8xl md:text-9xl font-serif font-bold text-gray-800 select-none block">?</span>
        </div>

        <div class="flex flex-col gap-3 mb-4">
            <input type="text" id="answer-input" 
                   autocomplete="off" 
                   autocorrect="off" 
                   autocapitalize="off" 
                   spellcheck="false"
                   enterkeyhint="done"
                   class="w-full py-4 rounded-2xl font-bold text-gray-700 placeholder-gray-300"
                   placeholder="발음 입력">
            
            <button id="action-button" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:bg-indigo-800 text-lg">
                확인
            </button>
        </div>

        <div id="feedback" class="text-center min-h-[5rem] flex flex-col justify-center items-center p-2 mb-4">
        </div>
        
        <button id="stats-button" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-3 rounded-xl transition-all text-sm">
            통계 보기
        </button>
    </div>

    <div id="stats-modal" class="fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md max-h-[80vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 class="text-lg font-bold">학습 통계</h2>
                <button id="close-modal-button" class="text-gray-400 p-2">닫기</button>
            </div>
            <div id="stats-content" class="p-5 overflow-y-auto"></div>
        </div>
    </div>

let shuffledData = [];
let currentIndex = 0;
let showingAnswer = false;

const questionCharElement = document.getElementById('question-char');
const answerInput = document.getElementById('answer-input');
const actionButton = document.getElementById('action-button');
const feedbackElement = document.getElementById('feedback');
const statsModal = document.getElementById('stats-modal');

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function createWeightedShuffledData() {
    let items = [...quizData];
    shuffleArray(items);
    return items.slice(0, 20); 
}

function displayQuestion() {
    showingAnswer = false;
    feedbackElement.innerHTML = '';
    answerInput.value = '';
    answerInput.readOnly = false;
    answerInput.className = 'w-full py-4 rounded-2xl font-bold text-gray-700 placeholder-gray-300';
    
    // 버튼 상태 초기화
    actionButton.textContent = "확인";
    actionButton.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:bg-indigo-800 text-lg";

    if (currentIndex >= shuffledData.length) {
        shuffledData = createWeightedShuffledData();
        currentIndex = 0;
    }
    
    questionCharElement.textContent = shuffledData[currentIndex].char;
    
    // 모달이 닫혀있을 때만 포커스 (모바일 키보드 제어)
    if(statsModal.classList.contains('hidden')) {
        setTimeout(() => answerInput.focus(), 100);
    }
}

function checkAnswer() {
    const userAnswer = answerInput.value.trim().toLowerCase();
    if (userAnswer === "") return;

    const currentQuestion = shuffledData[currentIndex];
    showingAnswer = true;
    const isCorrect = currentQuestion.romaji.includes(userAnswer);

    answerInput.readOnly = true; 

    if (isCorrect) {
        currentQuestion.correct++;
        answerInput.classList.add('correct');
        feedbackElement.innerHTML = `<p class="font-bold text-green-600 text-xl animate-bounce">정답입니다!</p>`;
    } else {
        currentQuestion.incorrect++;
        answerInput.classList.add('incorrect');
        feedbackElement.innerHTML = `
            <p class="font-bold text-red-500 text-lg">오답입니다</p>
            <p class="text-gray-600 text-sm">정답: <span class="font-bold text-gray-800">${currentQuestion.romaji.join(', ')}</span></p>
        `;
    }

    // 버튼을 "다음"으로 변경
    actionButton.textContent = "다음 문제";
    actionButton.className = "w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:bg-black text-lg";
}

function handleMainAction() {
    if (showingAnswer) {
        currentIndex++;
        displayQuestion();
    } else {
        checkAnswer();
    }
}

// 엔터 키 처리 (모바일 키보드의 완료/이동 버튼 포함)
answerInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        handleMainAction();
    }
});

// 메인 액션 버튼 클릭 처리
actionButton.addEventListener('click', handleMainAction);

// 통계 로직
document.getElementById('stats-button').addEventListener('click', () => {
    const correct = quizData.reduce((a, b) => a + b.correct, 0);
    const incorrect = quizData.reduce((a, b) => a + b.incorrect, 0);
    document.getElementById('stats-content').innerHTML = `
        <div class="text-center">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-green-50 p-4 rounded-2xl"><p class="text-xs text-green-600 font-bold">정답</p><p class="text-2xl font-bold">${correct}</p></div>
                <div class="bg-red-50 p-4 rounded-2xl"><p class="text-xs text-red-600 font-bold">오답</p><p class="text-2xl font-bold">${incorrect}</p></div>
            </div>
            <p class="text-gray-400 text-xs">문제를 풀수록 통계가 쌓입니다.</p>
        </div>`;
    statsModal.classList.remove('hidden');
});

document.getElementById('close-modal-button').addEventListener('click', () => {
    statsModal.classList.add('hidden');
    answerInput.focus();
});

function init() {
    shuffledData = createWeightedShuffledData();
    displayQuestion();
}

init();

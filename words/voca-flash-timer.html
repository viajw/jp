<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>일본어 플래시카드 (타이머)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'Noto Sans JP', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <style>
        /* [수정 1] 후리가나(Ruby) 스타일 개선: 브라우저 기본 동작 존중 */
        ruby {
            display: ruby; /* 브라우저 기본 루비 속성 사용 */
            ruby-position: over;
            margin: 0 2px;
        }
        ruby rt { 
            font-size: 0.5em; 
            text-align: center;
            color: #6b7280; 
            user-select: none; 
            line-height: 0; /* 높이 영향 최소화 */
            transform: translateY(-0.1em); /* 미세 위치 조정 */
        }

        .perspective-1000 { perspective: 1000px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .card-front { background-color: white; color: #1f2937; }
        .card-back {
            background-color: #f8fafc; color: #111827;
            transform: rotateY(180deg); border: 2px solid #e2e8f0;
        }
        .disabled-option {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(100%);
        }
        .font-mono-nums {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen font-sans p-4">

    <div id="setup-container" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 sm:p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">플래시카드</h1>
        <p class="text-center text-gray-500 mb-6">일본어 단어 암기 카드</p>
        
        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2">1. 학습 범위 선택</label>
            <div class="border rounded-lg p-3 max-h-32 overflow-y-auto bg-gray-50">
                <div class="flex items-center mb-2 pb-2 border-b">
                    <input type="checkbox" id="select-all-groups" class="h-4 w-4 text-indigo-600 rounded">
                    <label for="select-all-groups" class="ml-2 text-sm font-semibold">전체 선택</label>
                </div>
                <div id="group-checkbox-container">
                    <p class="text-xs text-gray-500">파일 로딩 중...</p>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2">2. 카드 모드 선택</label>
            <div class="flex space-x-2">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="card-mode" value="word-to-meaning" class="peer sr-only" checked>
                    <div class="text-center py-3 px-2 border-2 rounded-lg peer-checked:border-indigo-500 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 hover:bg-gray-50 transition-all">
                        <span class="block text-xs text-gray-500">Front → Back</span>
                        <span class="font-bold">단어 → 뜻</span>
                    </div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="card-mode" value="meaning-to-word" class="peer sr-only">
                    <div class="text-center py-3 px-2 border-2 rounded-lg peer-checked:border-indigo-500 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 hover:bg-gray-50 transition-all">
                        <span class="block text-xs text-gray-500">Front → Back</span>
                        <span class="font-bold">뜻 → 단어</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="mb-6">
            <div class="flex items-center justify-between mb-2">
                <label class="block text-sm font-bold text-gray-700">3. 타이머 모드 설정</label>
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="use-timer-toggle" class="sr-only peer">
                    <div class="relative w-9 h-5 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                    <span class="ml-2 text-xs text-gray-500 font-medium peer-checked:text-indigo-600">사용</span>
                </label>
            </div>
            <div id="timer-setting-box" class="border rounded-lg p-3 bg-gray-50 opacity-50 pointer-events-none transition-all duration-200">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-600">제한 시간 (최대 99초)</span>
                    <div class="flex items-center">
                        <input type="number" id="timer-seconds-input" value="5" min="1" max="99" class="w-20 p-2 border rounded text-center font-bold text-gray-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <span class="ml-2 text-sm text-gray-500">초 후 자동 넘김</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2">
                4. 학습 개수 설정 <span id="total-voca-display" class="text-indigo-600 text-xs font-normal ml-1">(총 0개 선택됨)</span>
            </label>
            <div class="flex flex-col space-y-2">
                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                    <input type="radio" name="count-mode" value="all" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500" checked>
                    <span class="ml-2 text-sm text-gray-700 font-medium">선택 범위 전체 학습</span>
                </label>
                
                <div class="flex items-center space-x-2">
                    <label class="flex-1 flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="radio" name="count-mode" value="custom" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500">
                        <span class="ml-2 text-sm text-gray-700 font-medium">개수 직접 입력</span>
                    </label>
                    <input type="number" id="custom-count-input" class="w-24 p-3 border rounded-lg text-center font-bold text-gray-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none disabled:bg-gray-100 disabled:text-gray-400" placeholder="0" disabled min="1">
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2">5. 카드 순서 설정</label>
            <div class="flex space-x-2">
                <label class="flex-1 cursor-pointer" id="order-random-label">
                    <input type="radio" name="card-order" value="random" class="peer sr-only" checked>
                    <div class="text-center py-3 px-2 border-2 rounded-lg peer-checked:border-indigo-500 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 hover:bg-gray-50 transition-all">
                        <span class="block text-xs text-gray-500">Shuffle</span>
                        <span class="font-bold">랜덤 섞기</span>
                    </div>
                </label>
                <label class="flex-1 cursor-pointer transition-opacity duration-200" id="order-sequential-label">
                    <input type="radio" name="card-order" value="sequential" class="peer sr-only">
                    <div class="text-center py-3 px-2 border-2 rounded-lg peer-checked:border-indigo-500 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 hover:bg-gray-50 transition-all">
                        <span class="block text-xs text-gray-500">As Listed</span>
                        <span class="font-bold">단어장 순서대로</span>
                    </div>
                </label>
            </div>
            <p id="order-warning-msg" class="text-xs text-orange-500 mt-1 hidden">※ 개수 제한 시 랜덤 섞기만 가능합니다.</p>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-bold text-gray-700 mb-2">6. 후리가나 설정</label>
            <label class="flex items-center p-3 border rounded-lg bg-gray-50 cursor-pointer hover:bg-gray-100 transition-colors">
                <input type="checkbox" id="show-furigana-checkbox" class="h-4 w-4 text-indigo-600 rounded focus:ring-indigo-500" checked>
                <span class="ml-2 text-sm text-gray-700 font-medium">후리가나 보이기</span>
            </label>
        </div>

        <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-transform active:scale-95 shadow-lg">
            학습 시작
        </button>
        <p id="setup-error" class="text-red-500 text-xs mt-2 text-center h-4"></p>
    </div>

    <div id="play-container" class="hidden w-full max-w-md flex flex-col items-center">
        
        <div class="w-full flex justify-between items-center mb-4 px-2 relative h-10">
            <div class="flex items-center space-x-3">
                <button id="exit-btn" class="text-gray-400 hover:text-gray-700 font-medium text-sm flex items-center transition-colors">
                    <span class="text-lg mr-1">✕</span> 종료
                </button>
                <button id="mid-share-btn" class="text-gray-400 hover:text-indigo-600 transition-colors p-1" title="저장된 단어 보기 및 관리">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
                    </svg>
                </button>
            </div>

            <div id="timer-display" class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 font-mono-nums font-bold text-2xl text-gray-700 hidden bg-white px-3 py-1 rounded shadow-sm border border-gray-100 min-w-[70px] text-center">
                5.0
            </div>

            <div class="text-sm font-bold text-indigo-600">
                <span id="current-count">1</span> / <span id="total-count">0</span>
            </div>
        </div>

        <div class="perspective-1000 w-full h-96 mb-6 relative group">
            <div id="card-inner" class="card-inner w-full h-full">
                
                <div class="card-face card-front flex flex-col p-6">
                    <span class="text-gray-400 text-xs uppercase tracking-widest mb-2 absolute top-6">문제</span>
                    <div id="card-front-content" class="font-bold text-center break-keep w-full mt-4 mb-8 leading-normal"></div>
                    <p class="text-gray-400 text-xs absolute bottom-6 animate-pulse">터치해서 정답 확인</p>
                </div>

                <div class="card-face card-back flex flex-col p-6">
                    <button id="bookmark-btn" class="absolute top-4 left-4 text-gray-400 hover:text-red-500 transition-colors p-2 z-20"></button>
                    
                    <span class="text-indigo-400 text-xs uppercase tracking-widest mb-2 absolute top-6">정답</span>
                    <div id="card-back-content" class="font-medium text-center break-keep w-full mt-4 mb-8 leading-normal"></div>
                    <button id="dict-btn" class="absolute top-4 right-4 text-gray-400 hover:text-indigo-500 transition-colors p-2 z-20">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
                    </button>
                    <p class="text-gray-400 text-xs absolute bottom-6 animate-pulse">터치해서 다음 단어</p>
                </div>
            </div>
        </div>

        <div id="simple-result-msg" class="hidden text-center mt-8 w-full flex flex-col items-center justify-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">학습 완료! 🎉</h2>
            <p class="text-gray-600 mb-8">선택한 범위의 모든 단어를 확인했습니다.</p>
            
            <div class="w-full space-y-3">
                <button id="share-bookmarks-btn-simple" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors hidden">❤️ 저장한 단어 공유하기</button>
                <button onclick="location.reload()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-900 transition-colors shadow-lg">처음으로 돌아가기</button>
            </div>
        </div>

    </div>

    <div id="result-view" class="hidden w-full max-w-md flex flex-col h-screen py-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center flex-shrink-0">학습 결과 📊</h2>
        
        <div class="flex justify-center gap-2 mb-4 flex-shrink-0 px-4">
            <button onclick="renderResultList('original')" class="text-xs px-3 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium transition-colors focus:bg-gray-300 focus:ring-2">원래 순서</button>
            <button onclick="renderResultList('desc')" class="text-xs px-3 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium transition-colors focus:bg-gray-300 focus:ring-2">오래 걸린 순 ▼</button>
            <button onclick="renderResultList('asc')" class="text-xs px-3 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium transition-colors focus:bg-gray-300 focus:ring-2">빨리 푼 순 ▲</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 space-y-2 mb-4" id="result-list-container">
            </div>

        <div class="px-4 flex-shrink-0 space-y-2">
            <button id="share-results-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
                </svg>
                결과 공유하기
            </button>

            <button id="share-timeout-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center hidden">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
                ⏰ 시간 초과 단어 공유
            </button>
            
            <button onclick="location.reload()" class="w-full bg-gray-800 text-white py-3 rounded-lg font-bold hover:bg-gray-900 transition-colors shadow-lg">처음으로 돌아가기</button>
        </div>
    </div>

    <div id="share-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[80vh]">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-bold text-lg text-gray-800">저장된 단어장</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600 p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div id="share-list-container" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

            <div class="p-4 border-t bg-gray-50">
                <button id="modal-share-act-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
                    </svg>
                    공유하기
                </button>
            </div>
        </div>
    </div>

    <script>
        let allVocabGroups = {};
        let learningQueue = [];
        let currentIndex = 0;
        let currentMode = 'word-to-meaning';
        let isFlipped = false;
        let showFurigana = true; 

        // --- 타이머 관련 변수 ---
        let timerEnabled = false;
        let timerDuration = 5;
        let timerInterval = null;
        let timeLeft = 0; 
        let cardStartTime = 0; 
        // -----------------------

        let currentResultSortType = 'original';

        const setupContainer = document.getElementById('setup-container');
        const playContainer = document.getElementById('play-container');
        const resultView = document.getElementById('result-view'); 
        const resultListContainer = document.getElementById('result-list-container');
        
        const simpleResultMsg = document.getElementById('simple-result-msg'); // 심플 결과 화면 div

        const groupCheckboxContainer = document.getElementById('group-checkbox-container');
        const selectAllGroups = document.getElementById('select-all-groups');
        const startBtn = document.getElementById('start-btn');
        const setupError = document.getElementById('setup-error');
        
        const cardInner = document.getElementById('card-inner');
        const cardFrontContent = document.getElementById('card-front-content');
        const cardBackContent = document.getElementById('card-back-content');
        
        const exitBtn = document.getElementById('exit-btn');
        const dictBtn = document.getElementById('dict-btn');
        const bookmarkBtn = document.getElementById('bookmark-btn');
        const currentCountEl = document.getElementById('current-count');
        const totalCountEl = document.getElementById('total-count');
        
        const shareBookmarksBtnSimple = document.getElementById('share-bookmarks-btn-simple'); // 심플용 공유 버튼

        const shareResultsBtn = document.getElementById('share-results-btn'); 
        const shareTimeoutBtn = document.getElementById('share-timeout-btn'); 

        const countRadios = document.getElementsByName('count-mode');
        const customCountInput = document.getElementById('custom-count-input');
        const totalVocaDisplay = document.getElementById('total-voca-display');
        const orderSequentialLabel = document.getElementById('order-sequential-label');
        const orderSequentialRadio = document.querySelector('input[value="sequential"]');
        const orderRandomRadio = document.querySelector('input[value="random"]');
        const orderWarningMsg = document.getElementById('order-warning-msg');
        const showFuriganaCheckbox = document.getElementById('show-furigana-checkbox');

        const midShareBtn = document.getElementById('mid-share-btn');
        const shareModal = document.getElementById('share-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const shareListContainer = document.getElementById('share-list-container');
        const modalShareActBtn = document.getElementById('modal-share-act-btn');

        const useTimerToggle = document.getElementById('use-timer-toggle');
        const timerSettingBox = document.getElementById('timer-setting-box');
        const timerSecondsInput = document.getElementById('timer-seconds-input');
        const timerDisplay = document.getElementById('timer-display');

        useTimerToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                timerSettingBox.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                timerSettingBox.classList.add('opacity-50', 'pointer-events-none');
            }
        });

        timerSecondsInput.addEventListener('input', function() {
            const max = parseInt(this.max);
            const val = parseFloat(this.value);
            if (val > max) {
                this.value = max;
            }
        });

        async function loadVocabulary() {
            try {
                const response = await fetch('japanese.voca?t=' + new Date().getTime());
                if (!response.ok) throw new Error('japanese.voca 파일을 찾을 수 없습니다.');
                const text = await response.text();
                
                allVocabGroups = {};
                let currentGroup = '미분류';
                
                text.split('\n').forEach(line => {
                    line = line.trim();
                    if (!line || line.startsWith('#')) return;
                    if (line.startsWith('@')) {
                        currentGroup = line.substring(1).trim();
                        if (!allVocabGroups[currentGroup]) allVocabGroups[currentGroup] = [];
                    } else {
                        const parts = line.split(' - ');
                        if (parts.length >= 2) {
                            const word = parts[0].trim();
                            const meaning = parts.slice(1).join(' - ').trim();
                            if (!allVocabGroups[currentGroup]) allVocabGroups[currentGroup] = [];
                            allVocabGroups[currentGroup].push({ word, meaning, isBookmarked: false, timeTaken: 0, isTimeout: false });
                        }
                    }
                });
                renderGroupCheckboxes();
            } catch (err) {
                groupCheckboxContainer.innerHTML = `<p class="text-red-500">${err.message}</p>`;
            }
        }

        function renderGroupCheckboxes() {
            groupCheckboxContainer.innerHTML = '';
            Object.keys(allVocabGroups).forEach(group => {
                const div = document.createElement('div');
                div.className = 'flex items-center mb-2';
                div.innerHTML = `
                    <input type="checkbox" name="group-select" value="${group}" class="h-4 w-4 text-indigo-600 rounded focus:ring-indigo-500">
                    <label class="ml-2 text-sm text-gray-700 cursor-pointer select-none flex-1" onclick="this.previousElementSibling.click()">
                        ${group} <span class="text-gray-400 text-xs">(${allVocabGroups[group].length})</span>
                    </label>
                `;
                groupCheckboxContainer.appendChild(div);
            });

            document.querySelectorAll('input[name="group-select"]').forEach(cb => {
                cb.addEventListener('change', updateAvailableCount);
            });
            updateAvailableCount();
        }

        function updateAvailableCount() {
            const selectedGroups = Array.from(document.querySelectorAll('input[name="group-select"]:checked')).map(cb => cb.value);
            let totalCount = 0;
            selectedGroups.forEach(g => totalCount += allVocabGroups[g].length);
            
            totalVocaDisplay.textContent = `(총 ${totalCount}개 선택됨)`;
            customCountInput.max = totalCount;
            
            if (customCountInput.value && parseInt(customCountInput.value) > totalCount) {
                customCountInput.value = totalCount;
            }
        }

        customCountInput.addEventListener('input', function() {
            const max = parseInt(this.max);
            const val = parseInt(this.value);
            if (val > max) {
                this.value = max;
            }
        });

        countRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'custom') {
                    customCountInput.disabled = false;
                    customCountInput.focus();
                    
                    orderRandomRadio.checked = true;
                    orderSequentialRadio.disabled = true;
                    orderSequentialLabel.classList.add('disabled-option');
                    orderWarningMsg.classList.remove('hidden');
                } else {
                    customCountInput.disabled = true;
                    customCountInput.value = ''; 
                    setupError.textContent = ''; 
                    
                    orderSequentialRadio.disabled = false;
                    orderSequentialLabel.classList.remove('disabled-option');
                    orderWarningMsg.classList.add('hidden');
                }
            });
        });

        customCountInput.addEventListener('input', () => {
            setupError.textContent = '';
        });

        function formatFurigana(word) {
            return word.replace(/([\u4E00-\u9FAF]+)\[([^\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>')
                       .replace(/([^\u4E00-\u9FAF\s]+)\[([^\]]+)\]/g, '<ruby>$1<rt>$2</rt></ruby>');
        }

        function getDisplayWord(word) {
            if (showFurigana) {
                return formatFurigana(word); 
            } else {
                return word.replace(/\[[^\]]+\]/g, ''); 
            }
        }

        function getRawWord(word) {
             const match = word.match(/([^\[]*)\[([^\]]+)\]([^\[]*)/);
             if (match) {
                const [_, before, inside, after] = match;
                return /[\u4E00-\u9FAF]/.test(inside) ? (before + inside + after) : (before + after);
             }
             return word.replace(/\[[^\]]+\]/g, '').trim();
        }

        function shuffleArray(array) {
            const newArray = [...array]; 
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function getFontSizeClass(text) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = text;
            const cleanText = tempDiv.textContent || tempDiv.innerText || "";
            const len = cleanText.length;

            if (len <= 3) {
                return "text-6xl sm:text-7xl"; 
            } else if (len <= 6) {
                return "text-5xl sm:text-6xl"; 
            } else if (len <= 10) {
                return "text-4xl sm:text-5xl"; // "ちゅうごくじん"은 여기에 해당하여 적절히 조절됩니다.
            } else if (len <= 15) {
                return "text-3xl sm:text-4xl"; 
            } else {
                return "text-xl sm:text-2xl";   
            }
        }

        // --- 타이머 로직 ---
        let endTime; 

        function updateTimerUI() {
            timerDisplay.textContent = timeLeft.toFixed(1);
            
            if (timeLeft <= 1.5) { 
                timerDisplay.classList.add('text-red-600');
                timerDisplay.classList.remove('text-gray-700');
            } else {
                timerDisplay.classList.add('text-gray-700');
                timerDisplay.classList.remove('text-red-600');
            }
        }

        function startCardTimer() {
            stopCardTimer();
            
            const now = Date.now();
            endTime = now + (timerDuration * 1000);
            timeLeft = timerDuration;
            
            updateTimerUI();
            timerDisplay.classList.remove('hidden');
            
            timerInterval = setInterval(() => {
                const current = Date.now();
                const remainingMs = endTime - current;
                
                if (remainingMs <= 0) {
                    timeLeft = 0;
                    updateTimerUI();
                    stopCardTimer();
                    if (!isFlipped) {
                        const item = learningQueue[currentIndex];
                        item.timeTaken = parseFloat(timerDuration);
                        item.isTimeout = true; 
                        flipCard(true); 
                    }
                } else {
                    timeLeft = remainingMs / 1000;
                    updateTimerUI();
                }
            }, 10); 
        }

        function stopCardTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startGame() {
            setupError.textContent = ''; 
            
            showFurigana = showFuriganaCheckbox.checked;
            
            timerEnabled = useTimerToggle.checked;
            if (timerEnabled) {
                const val = parseFloat(timerSecondsInput.value);
                if (isNaN(val) || val < 1) {
                    setupError.textContent = '타이머 시간을 올바르게 입력해주세요.';
                    return;
                }
                timerDuration = val;
            }

            const selectedGroups = Array.from(document.querySelectorAll('input[name="group-select"]:checked')).map(cb => cb.value);
            if (selectedGroups.length === 0) {
                setupError.textContent = '최소 1개 이상의 그룹을 선택해주세요.';
                return;
            }

            learningQueue = [];
            selectedGroups.forEach(g => {
                const groupItems = allVocabGroups[g].map(item => ({ ...item, isBookmarked: false, timeTaken: 0, isTimeout: false }));
                learningQueue.push(...groupItems);
            });

            if (learningQueue.length === 0) {
                setupError.textContent = '선택한 그룹에 단어가 없습니다.';
                return;
            }

            const countMode = document.querySelector('input[name="count-mode"]:checked').value;
            const orderMode = document.querySelector('input[name="card-order"]:checked').value;
            const modeRadio = document.querySelector('input[name="card-mode"]:checked');
            currentMode = modeRadio ? modeRadio.value : 'word-to-meaning';

            if (countMode === 'custom') {
                let count = parseInt(customCountInput.value);
                
                if (isNaN(count) || count < 1) {
                    setupError.textContent = '올바른 단어 개수를 입력해주세요.';
                    customCountInput.focus();
                    return;
                }

                if (count > learningQueue.length) {
                    count = learningQueue.length;
                    customCountInput.value = count;
                }

                learningQueue = shuffleArray(learningQueue);
                learningQueue = learningQueue.slice(0, count);

            } else {
                if (orderMode === 'random') {
                    learningQueue = shuffleArray(learningQueue);
                }
            }

            currentIndex = 0;
            totalCountEl.textContent = learningQueue.length;
            setupContainer.classList.add('hidden');
            playContainer.classList.remove('hidden');
            resultView.classList.add('hidden'); 
            simpleResultMsg.classList.add('hidden'); // 초기화
            
            renderCard();
        }

        function renderCard() {
            stopCardTimer(); 

            if (currentIndex >= learningQueue.length) {
                finishGame();
                return;
            }

            const item = learningQueue[currentIndex];
            currentCountEl.textContent = currentIndex + 1;
            
            cardStartTime = Date.now();

            cardInner.style.transition = 'none';
            cardInner.classList.remove('is-flipped');
            isFlipped = false;
            void cardInner.offsetWidth; 
            cardInner.style.transition = 'transform 0.6s';

            // [수정됨] 타이머 모드 시 북마크 버튼 숨기기
            if (timerEnabled) {
                bookmarkBtn.classList.add('hidden');
                setTimeout(() => {
                   if (!isFlipped && currentIndex < learningQueue.length) {
                       startCardTimer();
                   }
                }, 100); 
            } else {
                bookmarkBtn.classList.remove('hidden');
                timerDisplay.classList.add('hidden');
            }

            const displayWord = getDisplayWord(item.word);
            const rawWord = getRawWord(item.word);
            const meaning = item.meaning;

            let frontContent = "";
            let backContent = "";

            if (currentMode === 'word-to-meaning') {
                frontContent = displayWord;
                backContent = meaning;
            } else {
                frontContent = meaning;
                backContent = displayWord;
            }

            const frontSizeClass = getFontSizeClass(currentMode === 'word-to-meaning' ? rawWord : frontContent);
            const backSizeClass = getFontSizeClass(currentMode === 'word-to-meaning' ? backContent : rawWord);

            // [수정] break-keep 대신 break-all을 사용하고, 양옆 여백(px-4)을 강제합니다.
            cardFrontContent.className = `font-bold text-center break-all w-full px-4 leading-tight ${frontSizeClass}`;
            cardBackContent.className = `font-medium text-center break-all w-full px-4 leading-tight ${backSizeClass}`;

            cardFrontContent.innerHTML = frontContent;
            cardBackContent.innerHTML = backContent;

            updateBookmarkIcon(item.isBookmarked);

            dictBtn.onclick = (e) => {
                e.stopPropagation();
                window.open(`https://ja.dict.naver.com/#/search?query=${encodeURIComponent(rawWord)}`, '_blank');
            };

            bookmarkBtn.onclick = (e) => {
                e.stopPropagation();
                item.isBookmarked = !item.isBookmarked;
                updateBookmarkIcon(item.isBookmarked);
            };
        }

        function updateBookmarkIcon(isSaved) {
            if (isSaved) {
                bookmarkBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-red-500"> <path fill-rule="evenodd" d="M6.32 2.577a49.255 49.255 0 0 1 11.36 0c1.497.174 2.57 1.46 2.57 2.93V21a.75.75 0 0 1-1.085.67L12 18.089l-7.165 3.583A.75.75 0 0 1 3.75 21V5.507c0-1.47 1.073-2.756 2.57-2.93Z" clip-rule="evenodd" /> </svg>`;
                bookmarkBtn.classList.remove('text-gray-400');
                bookmarkBtn.classList.add('text-red-500');
            } else {
                bookmarkBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"> <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 11.186 0Z" /> </svg>`;
                bookmarkBtn.classList.add('text-gray-400');
                bookmarkBtn.classList.remove('text-red-500');
            }
        }

        function flipCard(byTimer = false) {
            if (isFlipped) return;
            stopCardTimer(); 
            isFlipped = true;
            cardInner.classList.add('is-flipped');

            if (!byTimer) {
                const duration = (Date.now() - cardStartTime) / 1000;
                const item = learningQueue[currentIndex];
                item.timeTaken = parseFloat(duration.toFixed(2));
                item.isTimeout = false;
            }
        }

        function nextCard() {
            currentIndex++;
            renderCard(); 
        }

        function finishGame() {
            stopCardTimer();
            document.querySelector('.perspective-1000').classList.add('hidden');
            document.querySelector('#play-container > div.w-full.flex.justify-between').classList.add('hidden'); 
            
            // [분기 로직] 타이머 모드 여부에 따라 결과 화면 다르게 노출
            if (timerEnabled) {
                // 1. 타이머 ON -> 상세 결과 View
                playContainer.classList.add('hidden');
                resultView.classList.remove('hidden');
                renderResultList('original');
                
                // 타임아웃 단어가 있는지 확인하여 버튼 표시
                const timeoutItems = learningQueue.filter(item => item.isTimeout);
                if (timeoutItems.length > 0) {
                    shareTimeoutBtn.classList.remove('hidden');
                    shareTimeoutBtn.textContent = `⏰ 시간 초과 단어 (${timeoutItems.length}개) 공유`;
                } else {
                    shareTimeoutBtn.classList.add('hidden');
                }
            } else {
                // 2. 타이머 OFF -> 심플 결과 Msg (기존 playContainer 내부에 띄움)
                // playContainer는 숨기지 않고 내용물만 바꿈
                simpleResultMsg.classList.remove('hidden');
                
                const savedItems = learningQueue.filter(item => item.isBookmarked);
                if (savedItems.length > 0) {
                    shareBookmarksBtnSimple.classList.remove('hidden');
                    shareBookmarksBtnSimple.textContent = `❤️ 저장한 단어 (${savedItems.length}개) 공유하기`;
                } else {
                    shareBookmarksBtnSimple.classList.add('hidden');
                }
            }
        }

        function renderResultList(sortType) {
            currentResultSortType = sortType; 

            const listContainer = document.getElementById('result-list-container');
            listContainer.innerHTML = '';

            let sortedQueue = [...learningQueue];
            
            if (sortType === 'asc') {
                sortedQueue.sort((a, b) => a.timeTaken - b.timeTaken);
            } else if (sortType === 'desc') {
                sortedQueue.sort((a, b) => b.timeTaken - a.timeTaken);
            } 

            if (sortedQueue.length === 0) return;

            sortedQueue.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'p-3 bg-white rounded-lg shadow-sm border border-gray-100 flex items-center justify-between';
                
                const timeClass = item.isTimeout ? 'text-red-500 font-bold' : (item.timeTaken < 1.5 ? 'text-green-500 font-bold' : 'text-indigo-600 font-bold');
                const timeoutLabel = item.isTimeout ? '<span class="text-[10px] bg-red-100 text-red-600 px-1 rounded ml-1">Time Over</span>' : '';

                div.innerHTML = `
                    <div class="flex-1 min-w-0 mr-2">
                        <div class="font-bold text-gray-800 truncate">${getDisplayWord(item.word)}</div>
                        <div class="text-xs text-gray-500 truncate">${item.meaning}</div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <div class="${timeClass} font-mono-nums">${item.timeTaken.toFixed(2)}s</div>
                        ${timeoutLabel}
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        async function executeResultShare(btnElement) {
            if (learningQueue.length === 0) return;

            let listToShare = [...learningQueue];
            if (currentResultSortType === 'asc') {
                listToShare.sort((a, b) => a.timeTaken - b.timeTaken);
            } else if (currentResultSortType === 'desc') {
                listToShare.sort((a, b) => b.timeTaken - a.timeTaken);
            }

            let shareText = `[일본어 학습 결과 - ${new Date().toLocaleDateString()}]\n`;
            shareText += `총 ${listToShare.length}개 단어\n\n`;

            listToShare.forEach((item, index) => {
                const cleanWord = item.word.replace(/\[[^\]]+\]/g, '');
                const timeStr = item.timeTaken.toFixed(1) + 's';
                const note = item.isTimeout ? ' - 시간초과' : '';
                
                shareText += `${index + 1}. ${cleanWord} - ${item.meaning} (${timeStr}${note})\n`;
            });

            try {
                if (navigator.share) {
                    await navigator.share({ title: '학습 결과 공유', text: shareText });
                } else {
                    throw new Error('Web Share API not supported');
                }
            } catch (err) {
                try {
                    await navigator.clipboard.writeText(shareText);
                    const originalText = btnElement.innerHTML;
                    btnElement.innerHTML = '✅ 복사됨!';
                    setTimeout(() => btnElement.innerHTML = originalText, 2000);
                } catch (copyErr) {
                    alert('공유/복사 실패');
                }
            }
        }

        async function executeTimeoutShare(btnElement) {
            const timeoutItems = learningQueue.filter(item => item.isTimeout);
            if (timeoutItems.length === 0) return;

            let shareText = `[⏰ 시간 초과 단어 목록]\n`;
            shareText += `총 ${timeoutItems.length}개 / 제한시간 ${timerDuration}초\n\n`;

            timeoutItems.forEach((item, index) => {
                const cleanWord = item.word.replace(/\[[^\]]+\]/g, '');
                shareText += `${index + 1}. ${cleanWord} - ${item.meaning}\n`;
            });

            try {
                if (navigator.share) {
                    await navigator.share({ title: '시간 초과 단어 공유', text: shareText });
                } else {
                    throw new Error('Web Share API not supported');
                }
            } catch (err) {
                try {
                    await navigator.clipboard.writeText(shareText);
                    const originalText = btnElement.innerHTML;
                    btnElement.innerHTML = '✅ 복사됨!';
                    setTimeout(() => btnElement.innerHTML = originalText, 2000);
                } catch (copyErr) {
                    alert('공유/복사 실패');
                }
            }
        }

        async function executeShare(btnElement) {
            const savedItems = learningQueue.filter(item => item.isBookmarked);
            if (savedItems.length === 0) {
                alert("저장된 단어가 없습니다.");
                return;
            }

            let shareText = `[일본어 단어장 - 저장된 단어]\n\n`;
            savedItems.forEach(item => {
                const cleanWord = item.word.replace(/\[[^\]]+\]/g, '');
                shareText += `${cleanWord} - ${item.meaning}\n`;
            });

            try {
                if (navigator.share) {
                    await navigator.share({ title: '저장된 단어장', text: shareText });
                } else {
                    throw new Error('Web Share API not supported');
                }
            } catch (err) {
                try {
                    await navigator.clipboard.writeText(shareText);
                    const originalText = btnElement.innerHTML;
                    btnElement.innerHTML = '✅ 복사됨!';
                    setTimeout(() => btnElement.innerHTML = originalText, 2000);
                } catch (copyErr) {
                    alert('공유/복사 실패');
                }
            }
        }

        function renderShareList() {
            const savedItems = learningQueue.filter(item => item.isBookmarked);
            
            shareListContainer.innerHTML = '';
            
            if (savedItems.length === 0) {
                shareListContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-32 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 mb-2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 11.186 0Z" />
                        </svg>
                        <p class="text-sm">저장된 단어가 없습니다.</p>
                    </div>
                `;
                modalShareActBtn.disabled = true;
                modalShareActBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
                modalShareActBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
            } else {
                modalShareActBtn.disabled = false;
                modalShareActBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
                modalShareActBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');

                savedItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'p-3 bg-gray-50 rounded-lg border border-gray-100 flex items-center justify-between group hover:border-indigo-200 transition-colors';
                    
                    const textDiv = document.createElement('div');
                    textDiv.className = 'flex-1 flex justify-between items-center mr-3';
                    
                    textDiv.innerHTML = `
                        <div class="font-medium text-gray-800">${getDisplayWord(item.word)}</div>
                        <div class="text-sm text-gray-500 ml-4 text-right">${item.meaning}</div>
                    `;

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'text-gray-300 hover:text-red-500 p-1 rounded-full hover:bg-red-50 transition-all';
                    deleteBtn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    `;
                    
                    deleteBtn.onclick = () => {
                        item.isBookmarked = false;
                        renderShareList();
                        if (learningQueue[currentIndex] === item) {
                            updateBookmarkIcon(false);
                        }
                    };

                    div.appendChild(textDiv);
                    div.appendChild(deleteBtn);
                    shareListContainer.appendChild(div);
                });
            }
        }

        midShareBtn.addEventListener('click', () => {
            renderShareList();
            shareModal.classList.remove('hidden');
        });

        closeModalBtn.addEventListener('click', () => {
            shareModal.classList.add('hidden');
        });
        
        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) shareModal.classList.add('hidden');
        });

        modalShareActBtn.addEventListener('click', () => executeShare(modalShareActBtn));

        document.addEventListener('DOMContentLoaded', loadVocabulary);
        selectAllGroups.addEventListener('change', (e) => {
            document.querySelectorAll('input[name="group-select"]').forEach(cb => cb.checked = e.target.checked);
            updateAvailableCount();
        });
        startBtn.addEventListener('click', startGame);

        cardInner.addEventListener('click', () => {
            if (!isFlipped) {
                flipCard(); 
            } else {
                nextCard(); 
            }
        });

        shareBookmarksBtnSimple.addEventListener('click', () => executeShare(shareBookmarksBtnSimple));
        shareResultsBtn.addEventListener('click', () => executeResultShare(shareResultsBtn));
        shareTimeoutBtn.addEventListener('click', () => executeTimeoutShare(shareTimeoutBtn));

        document.addEventListener('keydown', (e) => {
            if (playContainer.classList.contains('hidden')) return;
            if (!shareModal.classList.contains('hidden')) return; 

            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (!isFlipped) flipCard();
                else nextCard();
            }
        });

        exitBtn.addEventListener('click', () => location.reload());

    </script>
</body>
</html>
